<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go2travelplanner - Daily Activities</title>

  <!-- Link to our shared CSS file -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!--  NAVIGATION BAR (same on every page)-->
  <nav class="navbar">

    <a href="index.html" class="navbar-logo">
      <span style="font-size: 1.3rem;">⊙</span>
      Go2travelplanner
    </a>
  <div class="menu-toggle" onclick="toggleMenu()"> ☰</div>
    <ul class="navbar-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="cities.html">Cities</a></li>
      <li><a href="daily-activities.html" class="active">Daily Activities</a></li>
      <li><a href="my-trips.html">My Trips</a></li>
      <li><a href="login.html">Login</a></li>
      <li>
        <!-- JAVASCRIPT USED: dark mode toggle -->
        <button class="dark-toggle" id="darkToggleBtn" onclick="toggleDarkMode()">🌙</button>
      </li>
    </ul>

  </nav>


  <div class="daily-page">


    <div class="daily-header">

      <div class="daily-header-left">
        <h1>Daily Activities</h1>
        <p>Organize your attractions by day to create your perfect itinerary</p>
      </div>

      <div class="daily-header-right">
        <!-- Load Trip button -->
        <button class="btn-gray" onclick="showLoadtripPopup()"> 📂 Load Trip</button>

        <!-- Save Changes button -->
        <button class="btn-teal" onclick="showSaveChangesPopup()">💾 Save Changes</button>
      </div>

    </div>



    <div class="day-nav">

      <div class="day-nav-controls">
       
       
        <span style="color: var(--teal); font-size: 1.1rem;">📅</span>

       
       
 <input type="date" id="currentDayInput" value="2026-04-20" />
       
      </div>

      <!-- Add Day button on the right -->
      <button class="add-day-btn" onclick="showAddDayPopup()">+ Add Day</button>

    </div>


   
    <div class="day-card" id="dayCard">

      <!-- Day card header: date and "Add Activity" button -->
      <div class="day-card-header">
        <h3 id="dayCardTitle">Friday, February 27</h3>
        <button class="btn-teal" onclick="showAddActivityPopup()">+ Add Activity</button>
      </div>

      <!-- Empty state: shown when this day has no activities yet -->
      <div class="no-activities" id="noActivities">
        <p>No activities planned for this day</p>
        <button class="btn-teal" onclick="showAddActivityPopup()">Add First Activity</button>
      </div>

      
      
    </div>


  </div>



  <script src="jaava/darkmode.js"></script>
<!-- code from W3schools-->
  <script>

    function showLoadtripPopup() {
      alert("This button will load a saved trip from My trips ");
      Loadtrip();
    }

    function showSaveChangesPopup() {
      alert("This button will save the changes and update the My trips section");
      SaveChanges();
    }

    
    function showAddDayPopup() {
      alert("This button will add that day to the activity area");
      addDay();
    }

   
    function showAddActivityPopup() {
      alert("This button will Show stored activities for that specific day");
      addActivity();
    }

  
  </script>


<script>
  function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
  }
</script>

</body>
</html>
